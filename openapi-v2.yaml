        '204':
          description: Context deleted.
  /api/v2/export/:
    get:
      operationId: export_retrieve
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
      - in: query
        name: autumn_compatible
        schema:
          type: boolean
          default: false
      - in: query
        name: compress
        schema:
          type: boolean
          default: false
      - in: query
        name: context_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: end_date
        schema:
          type: string
          format: date
      - in: query
        name: exclude_project_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: exclude_subproject_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: exclude_tag_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: export_format
        schema:
          enum:
          - '1'
          - '2'
          type: string
          default: '2'
          minLength: 1
        description: |-
          * `1` - 1
          * `2` - 2
      - in: query
        name: note_snippet
        schema:
          type: string
          minLength: 1
      - in: query
        name: project_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: start_date
        schema:
          type: string
          format: date
      - in: query
        name: subproject_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: tag_ids
        schema:
          type: string
          minLength: 1
      tags:
      - export
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Format2Document'
          description: ''
