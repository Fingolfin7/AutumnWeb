openapi: 3.0.3
info:
  title: Autumn API v2
  version: 2.0.0
paths:
  /api/v2/me/:
    get:
      operationId: me_retrieve
      tags:
      - me
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
          description: ''
  /api/v2/projects/:
    get:
      operationId: projects_list
      parameters:
      - in: query
        name: context_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: exclude_project_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 100
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
          default: 0
      - in: query
        name: ordering
        schema:
          enum:
          - name
          - id
          type: string
          default: name
          minLength: 1
        description: |-
          * `name` - name
          * `id` - id
      - in: query
        name: search
        schema:
          type: string
          minLength: 1
      - in: query
        name: status
        schema:
          enum:
          - active
          - paused
          - complete
          - archived
          type: string
          minLength: 1
        description: |-
          * `active` - active
          * `paused` - paused
          * `complete` - complete
          * `archived` - archived
      - in: query
        name: tag_ids
        schema:
          type: string
          minLength: 1
      tags:
      - projects
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
          description: ''
    post:
      operationId: projects_create
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectCreateRequest'
        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResource'
          description: ''
  /api/v2/projects/{project_id}:
    get:
      operationId: projects_retrieve
      parameters:
      - in: path
        name: project_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDetailResource'
          description: ''
    patch:
      operationId: projects_partial_update
      parameters:
      - in: path
        name: project_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedProjectPatchRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedProjectPatchRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedProjectPatchRequest'
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResource'
          description: ''
    delete:
      operationId: projects_destroy
      parameters:
      - in: path
        name: project_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: Project deleted.
  /api/v2/projects/{project_id}/subprojects/:
    get:
      operationId: project_subprojects_list
      parameters:
      - in: path
        name: project_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubprojectListResponse'
          description: ''
    post:
      operationId: project_subprojects_create
      parameters:
      - in: path
        name: project_id
        schema:
          type: integer
        required: true
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubprojectCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SubprojectCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SubprojectCreateRequest'
        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubprojectResource'
          description: ''
  /api/v2/projects/merge/:
    post:
      operationId: projects_merge
      tags:
      - projects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectMergeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ProjectMergeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ProjectMergeRequest'
        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectResource'
          description: ''
  /api/v2/sessions/:
    get:
      operationId: sessions_list
      parameters:
      - in: query
        name: active
        schema:
          type: boolean
      - in: query
        name: context_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: end_date
        schema:
          type: string
          format: date
      - in: query
        name: exclude_project_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: exclude_subproject_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: exclude_tag_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: include
        schema:
          enum:
          - note
          type: string
          minLength: 1
        description: '* `note` - note'
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 100
      - in: query
        name: note_snippet
        schema:
          type: string
          minLength: 1
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
          default: 0
      - in: query
        name: project_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: start_date
        schema:
          type: string
          format: date
      - in: query
        name: subproject_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: tag_ids
        schema:
          type: string
          minLength: 1
      tags:
      - sessions
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionListResponse'
          description: ''
    post:
      operationId: sessions_create
      tags:
      - sessions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SessionTrackRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SessionTrackRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SessionTrackRequest'
        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
          description: ''
  /api/v2/sessions/{session_id}:
    get:
      operationId: sessions_retrieve
      parameters:
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - sessions
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
          description: ''
    patch:
      operationId: sessions_partial_update
      parameters:
      - in: header
        name: If-Match
        schema:
          type: integer
        description: Optional current integer session version.
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - sessions
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSessionPatchRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSessionPatchRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSessionPatchRequest'
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
          description: ''
    delete:
      operationId: sessions_destroy
      parameters:
      - in: header
        name: If-Match
        schema:
          type: integer
        description: Optional current integer session version.
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - sessions
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: Session deleted.
  /api/v2/subprojects/{subproject_id}:
    get:
      operationId: subprojects_retrieve
      parameters:
      - in: path
        name: subproject_id
        schema:
          type: integer
        required: true
      tags:
      - subprojects
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubprojectResource'
          description: ''
    patch:
      operationId: subprojects_partial_update
      parameters:
      - in: path
        name: subproject_id
        schema:
          type: integer
        required: true
      tags:
      - subprojects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedSubprojectPatchRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedSubprojectPatchRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedSubprojectPatchRequest'
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubprojectResource'
          description: ''
    delete:
      operationId: subprojects_destroy
      parameters:
      - in: path
        name: subproject_id
        schema:
          type: integer
        required: true
      tags:
      - subprojects
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: Subproject deleted.
  /api/v2/subprojects/merge/:
    post:
      operationId: subprojects_merge
      tags:
      - subprojects
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubprojectMergeRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/SubprojectMergeRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/SubprojectMergeRequest'
        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubprojectResource'
          description: ''
  /api/v2/timers/:
    get:
      operationId: timers_retrieve
      tags:
      - timers
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TimerListResponse'
          description: ''
    post:
      operationId: timers_create
      tags:
      - timers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimerStartRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TimerStartRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TimerStartRequest'
        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
          description: ''
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
          description: ''
  /api/v2/timers/{session_id}:
    delete:
      operationId: timers_destroy
      parameters:
      - in: header
        name: If-Match
        schema:
          type: integer
        description: Optional current integer session version.
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - timers
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: Timer deleted.
  /api/v2/timers/{session_id}/restart/:
    post:
      operationId: timers_restart_create
      parameters:
      - in: header
        name: If-Match
        schema:
          type: integer
        description: Optional current integer session version.
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - timers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimerRestartRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TimerRestartRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TimerRestartRequest'
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
          description: ''
  /api/v2/timers/{session_id}/stop/:
    post:
      operationId: timers_stop_create
      parameters:
      - in: header
        name: If-Match
        schema:
          type: integer
        description: Optional current integer session version.
      - in: path
        name: session_id
        schema:
          type: integer
        required: true
      tags:
      - timers
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TimerStopRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TimerStopRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TimerStopRequest'
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResource'
          description: ''
components:
  schemas:
    AllocationModeEnum:
      enum:
      - legacy_full
      - partitioned
      type: string
      description: |-
        * `legacy_full` - legacy_full
        * `partitioned` - partitioned
    Me:
      type: object
      properties:
        api_version:
          type: integer
        capabilities:
          type: array
          items:
            type: string
        user:
          $ref: '#/components/schemas/MeUser'
      required:
      - api_version
      - capabilities
      - user
    MeUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        timezone:
          type: string
      required:
      - id
      - timezone
      - username
    NamedResource:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
      - id
      - name
    PatchedProjectPatchRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          $ref: '#/components/schemas/StatusEnum'
        context_id:
          type: integer
          minimum: 1
          nullable: true
        tag_ids:
          type: array
          items:
            type: integer
            minimum: 1
        start_date:
          type: string
          format: date
    PatchedSessionPatchRequest:
      type: object
      properties:
        project_id:
          type: integer
          minimum: 1
        start:
          type: string
          format: date-time
          description: ISO-8601 instant; a timestamp without an offset is interpreted
            as UTC.
        end:
          type: string
          format: date-time
          description: ISO-8601 instant; a timestamp without an offset is interpreted
            as UTC.
        subproject_ids:
          type: array
          items:
            type: integer
            minimum: 1
        note:
          type: string
          nullable: true
    PatchedSubprojectPatchRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
    ProjectCreateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
        status:
          allOf:
          - $ref: '#/components/schemas/StatusEnum'
          default: active
        context_id:
          type: integer
          minimum: 1
          nullable: true
        tag_ids:
          type: array
          items:
            type: integer
            minimum: 1
      required:
      - name
    ProjectDetailResource:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          $ref: '#/components/schemas/StatusEnum'
        description:
          type: string
          readOnly: true
        context:
          allOf:
          - $ref: '#/components/schemas/NamedResource'
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/NamedResource'
          readOnly: true
        start_date:
          type: string
          format: date
          readOnly: true
        last_activity:
          type: string
          format: date
          nullable: true
          readOnly: true
        total_minutes:
          type: number
          format: double
          readOnly: true
        session_count:
          type: integer
        subprojects:
          type: array
          items:
            $ref: '#/components/schemas/SubprojectResource'
          readOnly: true
      required:
      - context
      - description
      - id
      - last_activity
      - name
      - session_count
      - start_date
      - status
      - subprojects
      - tags
      - total_minutes
    ProjectListResponse:
      type: object
      properties:
        count:
          type: integer
        total:
          type: integer
        projects:
          type: array
          items:
            $ref: '#/components/schemas/ProjectResource'
      required:
      - count
      - projects
      - total
    ProjectMergeRequest:
      type: object
      properties:
        source_ids:
          type: array
          items:
            type: integer
            minimum: 1
          maxItems: 2
          minItems: 2
        new_name:
          type: string
          maxLength: 255
      required:
      - new_name
      - source_ids
    ProjectResource:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        status:
          $ref: '#/components/schemas/StatusEnum'
        description:
          type: string
          readOnly: true
        context:
          allOf:
          - $ref: '#/components/schemas/NamedResource'
          nullable: true
        tags:
          type: array
          items:
            $ref: '#/components/schemas/NamedResource'
          readOnly: true
        start_date:
          type: string
          format: date
          readOnly: true
        last_activity:
          type: string
          format: date
          nullable: true
          readOnly: true
        total_minutes:
          type: number
          format: double
          readOnly: true
        session_count:
          type: integer
      required:
      - context
      - description
      - id
      - last_activity
      - name
      - session_count
      - start_date
      - status
      - tags
      - total_minutes
    ProjectSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
      - id
      - name
    SessionListResponse:
      type: object
      properties:
        count:
          type: integer
        total:
          type: integer
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/SessionResource'
      required:
      - count
      - sessions
      - total
    SessionResource:
      type: object
      properties:
        id:
          type: integer
        uuid:
          type: string
          format: uuid
          nullable: true
        version:
          type: integer
        project:
          $ref: '#/components/schemas/ProjectSummary'
        allocation_mode:
          $ref: '#/components/schemas/AllocationModeEnum'
        subproject_allocations:
          type: array
          items:
            $ref: '#/components/schemas/SubprojectAllocation'
          readOnly: true
        start:
          type: string
          format: date-time
          description: ISO-8601 instant; a timestamp without an offset is interpreted
            as UTC.
        end:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 instant; a timestamp without an offset is interpreted
            as UTC.
        active:
          type: boolean
          readOnly: true
        auto_stop_at:
          type: string
          format: date-time
          nullable: true
          description: ISO-8601 instant; a timestamp without an offset is interpreted
            as UTC.
        duration_minutes:
          type: number
          format: double
          nullable: true
          readOnly: true
        elapsed_minutes:
          type: number
          format: double
          nullable: true
          readOnly: true
        note:
          type: string
          nullable: true
      required:
      - active
      - allocation_mode
      - auto_stop_at
      - duration_minutes
      - elapsed_minutes
      - end
      - id
      - project
      - start
      - subproject_allocations
      - uuid
      - version
    SessionTrackRequest:
      type: object
      properties:
        project_id:
          type: integer
          minimum: 1
        start:
          type: string
          format: date-time
          description: ISO-8601 instant; a timestamp without an offset is interpreted
            as UTC.
        end:
          type: string
          format: date-time
          description: ISO-8601 instant; a timestamp without an offset is interpreted
            as UTC.
        subproject_ids:
          type: array
          items:
            type: integer
            minimum: 1
        note:
          type: string
          nullable: true
        uuid:
          type: string
          format: uuid
      required:
      - end
      - project_id
      - start
    StatusEnum:
      enum:
      - active
      - paused
      - complete
      - archived
      type: string
      description: |-
        * `active` - active
        * `paused` - paused
        * `complete` - complete
        * `archived` - archived
    SubprojectAllocation:
      type: object
      properties:
        subproject_id:
          type: integer
        name:
          type: string
        allocation_bp:
          type: integer
      required:
      - allocation_bp
      - name
      - subproject_id
    SubprojectCreateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        description:
          type: string
      required:
      - name
    SubprojectListResponse:
