        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitmentAdjustmentResponse'
          description: ''
  /api/v2/commitments/{commitment_id}/periods/:
    get:
      operationId: commitments_periods_list
      parameters:
      - in: path
        name: commitment_id
        schema:
          type: integer
        required: true
      - in: query
        name: generation
        schema:
          type: integer
          minimum: 1
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 100
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
          default: 0
      tags:
      - commitments
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitmentPeriodListResponse'
          description: ''
  /api/v2/commitments/{commitment_id}/restart/:
    post:
