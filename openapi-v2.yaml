  /api/v2/reports/charts/:
    get:
      operationId: reports_charts_list
      parameters:
      - in: query
        name: active
        schema:
          type: string
        description: Filter by active state (true or false).
      - in: query
        name: chart_type
        schema:
          type: string
          enum:
          - calendar
          - cumulative
          - heatmap
          - histogram
          - line
          - scatter
          - stacked_area
          - wordcloud
        required: true
      - in: query
        name: context
        schema:
          type: integer
      - in: query
        name: context_ids
        schema:
          type: string
        description: Comma-separated context IDs.
      - in: query
        name: end_date
        schema:
          type: string
        description: Inclusive local date in YYYY-MM-DD format.
      - in: query
        name: exclude_project_ids
        schema:
          type: string
        description: Comma-separated project IDs to exclude.
      - in: query
        name: exclude_projects
        schema:
          type: array
          items:
            type: integer
      - in: query
        name: exclude_subproject_ids
        schema:
          type: string
        description: Comma-separated subproject IDs to exclude.
      - in: query
        name: exclude_tag_ids
        schema:
          type: string
        description: Comma-separated tag IDs to exclude.
      - in: query
        name: note_snippet
        schema:
          type: string
        description: Case-insensitive note substring.
      - in: query
        name: project_ids
        schema:
          type: string
        description: Comma-separated project IDs.
      - in: query
        name: project_name
        schema:
          type: string
      - in: query
        name: start_date
        schema:
          type: string
        description: Inclusive local date in YYYY-MM-DD format.
      - in: query
        name: subproject_ids
        schema:
