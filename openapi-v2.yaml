      description: |-
        * `project` - project
        * `subproject` - subproject
        * `context` - context
        * `tag` - tag
    AllocationModeEnum:
      enum:
      - legacy_full
      - partitioned
      type: string
      description: |-
        * `legacy_full` - legacy_full
        * `partitioned` - partitioned
    ByEnum:
      enum:
      - project
      - subproject
      - context
      - status
      - tag
      type: string
      description: |-
        * `project` - project
        * `subproject` - subproject
        * `context` - context
        * `status` - status
        * `tag` - tag
    ChartPayloadRow:
      type: object
      properties:
        x:
          type: string
          format: date-time
        y:
          type: number
          format: double
        series:
          type: string
        date:
          type: string
          format: date
        hours:
          type: number
          format: double
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        label:
          type: string
        count:
          type: integer
        text:
          type: string
        weight:
          type: integer
