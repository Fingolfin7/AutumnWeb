            as UTC.
        reason:
          type: string
        balance:
          type: number
          format: double
      required:
      - amount
      - balance
      - effective_at
      - reason
      - seq
    CommitmentChangesRequest:
      type: object
      properties:
        aggregation_type:
          $ref: '#/components/schemas/AggregationTypeEnum'
        project_id:
