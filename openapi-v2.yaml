  /api/v2/projects/:
    get:
      operationId: projects_list
      parameters:
      - in: query
        name: context_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: exclude_project_ids
        schema:
          type: string
          minLength: 1
      - in: query
        name: limit
        schema:
          type: integer
          maximum: 500
          minimum: 1
          default: 100
      - in: query
        name: offset
        schema:
          type: integer
          minimum: 0
          default: 0
      - in: query
        name: ordering
        schema:
          enum:
          - name
          - id
          type: string
          default: name
          minLength: 1
        description: |-
          * `name` - name
          * `id` - id
      - in: query
        name: search
        schema:
          type: string
          minLength: 1
      - in: query
        name: status
        schema:
          enum:
          - active
          - paused
          - complete
          - archived
          type: string
          minLength: 1
        description: |-
          * `active` - active
          * `paused` - paused
          * `complete` - complete
          * `archived` - archived
      - in: query
        name: tag_ids
        schema:
          type: string
          minLength: 1
      tags:
      - projects
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectListResponse'
          description: ''
    post:
