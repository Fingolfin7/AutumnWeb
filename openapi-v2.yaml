openapi: 3.0.3
info:
  title: Autumn API v2
  version: 2.0.0
paths:
  /api/v2/commitments/:
    get:
      operationId: commitments_list
      tags:
      - commitments
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitmentListResponse'
          description: ''
    post:
      operationId: commitments_create
      tags:
      - commitments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommitmentCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CommitmentCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CommitmentCreateRequest'
        required: true
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitmentResource'
          description: ''
  /api/v2/commitments/{commitment_id}:
    get:
      operationId: commitments_retrieve
      parameters:
      - in: path
        name: commitment_id
        schema:
          type: integer
        required: true
      tags:
      - commitments
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitmentResource'
          description: ''
    patch:
      operationId: commitments_partial_update
      parameters:
      - in: header
        name: If-Match
        schema:
          type: integer
        description: Optional current integer commitment version.
      - in: path
        name: commitment_id
        schema:
          type: integer
        required: true
      tags:
      - commitments
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCommitmentChangesRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCommitmentChangesRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCommitmentChangesRequest'
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommitmentResource'
          description: ''
    delete:
      operationId: commitments_destroy
      parameters:
      - in: header
        name: If-Match
        schema:
          type: integer
        description: Optional current integer commitment version.
      - in: path
        name: commitment_id
        schema:
          type: integer
        required: true
      tags:
      - commitments
      security:
      - basicAuth: []
      - cookieAuth: []
      - tokenAuth: []
      responses:
        '204':
          description: Commitment deleted.
  /api/v2/commitments/{commitment_id}/adjustments/:
    post:
      operationId: commitments_adjustments_create
      parameters:
      - in: path
        name: commitment_id
        schema:
          type: integer
