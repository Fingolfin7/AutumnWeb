          minimum: 1
        context_id:
          type: integer
          minimum: 1
        tag_id:
          type: integer
          minimum: 1
        commitment_type:
          $ref: '#/components/schemas/CommitmentTypeEnum'
        period:
          $ref: '#/components/schemas/PeriodEnum'
        start_date:
          type: string
          format: date
        timezone:
          type: string
          maxLength: 64
        target_value:
          type: integer
          minimum: 1
        banking_enabled:
          type: boolean
        max_balance:
          type: integer
        min_balance:
          type: integer
        active:
          type: boolean
        include_project_ids:
          type: array
          items:
            type: integer
            minimum: 1
        exclude_project_ids:
          type: array
          items:
            type: integer
            minimum: 1
        include_subproject_ids:
          type: array
          items:
            type: integer
            minimum: 1
        exclude_subproject_ids:
          type: array
          items:
            type: integer
            minimum: 1
        include_context_ids:
          type: array
          items:
            type: integer
            minimum: 1
        exclude_context_ids:
          type: array
          items:
            type: integer
            minimum: 1
        include_tag_ids:
          type: array
          items:
            type: integer
            minimum: 1
        exclude_tag_ids:
          type: array
          items:
            type: integer
            minimum: 1
