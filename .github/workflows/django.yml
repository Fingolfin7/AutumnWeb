name: Django CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]
  workflow_dispatch: # manual runs (e.g. the index benchmark job)

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest # matches the Render deploy environment
            python-version: '3.13'
            db-image: postgres:16-alpine # test against the production DB engine
          - os: windows-latest # matches local dev
            python-version: '3.10'
            db-image: '' # empty image skips the service (SQLite; Windows runners can't host Linux containers)

    services:
      postgres:
        image: ${{ matrix.db-image }}
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-${{ github.run_id }}
          POSTGRES_DB: autumn
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE_CONTENTS }}" > AutumnWeb/.env

      # Appended (not set as an env var) because settings.py reads .env with
      # overwrite=True, so the file wins over OS environment variables.
      - name: Point tests at the Postgres service (Linux only)
        if: runner.os == 'Linux'
        run: |
          echo "" >> AutumnWeb/.env
          echo "DATABASE_URL=postgres://postgres:ci-${{ github.run_id }}@localhost:5432/autumn" >> AutumnWeb/.env

      # No migrate step needed: the test runner creates its own database
      # and applies migrations to it automatically.
      - name: Run Django tests
        env:
          DJANGO_SETTINGS_MODULE: AutumnWeb.settings
        run: |
          python manage.py test

      - name: Verify committed v2 OpenAPI schema (Linux only)
        if: runner.os == 'Linux'
        env:
          DJANGO_SETTINGS_MODULE: AutumnWeb.settings
        run: |
          python manage.py spectacular --file "$RUNNER_TEMP/openapi-v2.yaml"
          git diff --no-index -- openapi-v2.yaml "$RUNNER_TEMP/openapi-v2.yaml"

  # Manual-only: times the hot queries with/without the pre-S5 indexes on the
  # production DB engine. Informs the deferred index drops (plan S5/S12).
  index-benchmark:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ci-${{ github.run_id }}
          POSTGRES_DB: autumn_bench
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE_CONTENTS }}" > AutumnWeb/.env
          echo "" >> AutumnWeb/.env
          echo "DATABASE_URL=postgres://postgres:ci-${{ github.run_id }}@localhost:5432/autumn_bench" >> AutumnWeb/.env

      - name: Migrate benchmark database
        env:
          DJANGO_SETTINGS_MODULE: AutumnWeb.settings
        run: |
          python manage.py migrate

      - name: Run index benchmark
        env:
          DJANGO_SETTINGS_MODULE: AutumnWeb.settings
        run: |
          python manage.py chz_benchmark_indexes --explain
